# Estrategia 3v3 Scaled - Transiciones Defensa-Ataque
# Adaptada para 3 jugadores (1 portero + 2 campo)
#
# Formaciones:
# DEFENSA: t13_3v3_scaled (1 defensor + 1 delantero)
# ATAQUE:  t22_3v3_scaled (2 delanteros)
#
# Transiciones:
# - Defensa -> Ataque: ballX > 400 y tiempo > 250ms
# - Ataque -> Defensa: ballX < -400 o pocos jugadores

tactics = [
          {
          # ESTADO DEFENSIVO: 1 defensor + 1 delantero
          tactic = t13_3v3_scaled;
          transitions = [
          {
          # Transición a Ataque: Balón avanza significativamente
          to = t22_3v3_scaled;
          conditions = [
          {
          numOfFieldPlayersGE = 2;
          ballXThreshold = 400;
          timeSinceBallAheadOfThresholdGE = 250;
          }
          ];
          }
          ];
          },
          {
          # ESTADO OFENSIVO: 2 delanteros
          tactic = t22_3v3_scaled;
          transitions = [
          {
          # Transición a Defensa: Pocos jugadores disponibles
          to = t13_3v3_scaled;
          conditions = [
          {
          numOfFieldPlayersLE = 1;
          }
          ];
          },
          {
          # Transición a Defensa: Balón retrocede significativamente
          to = t13_3v3_scaled;
          conditions = [
          {
          numOfFieldPlayersGE = 2;
          ballXThreshold = -400;
          timeSinceBallBehindThresholdGE = 250;
          }
          ];
          }
          ];
          }
];

# Jugadas propias de saque
ownKickOffs = [
              {
              type = attackKickOff_scaled;
              weight = 1;
              }
];

# Jugadas de saque del oponente
opponentKickOffs = [
                   {
                   type = kiteKickOff_scaled;
                   weight = 1;
                   }
];

# Penaltis propios
ownPenaltyKicks = [
                  {
                  type = theOneTrueOwnPenaltyKick_scaled;
                  weight = 1;
                  }
];

# Penaltis del oponente (defensa)
opponentPenaltyKicks = [
                       {
                       type = theOneTrueOpponentPenaltyKick_scaled;
                       weight = 1;
                       }
];

# Saques de esquina o tiros libres propios
ownFreeKicks = [
               {
               type = ownCornerKick_scaled;
               weight = 1;
               },
               {
               type = ownGoalKick_scaled;
               weight = 1;
               }
];

# Saques de esquina o tiros libres del oponente (defensa)
opponentFreeKicks = [
                    {
                    type = opponentCornerKick_scaled;
                    weight = 1;
                    }
];
