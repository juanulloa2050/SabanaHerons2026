# Estrategia 4v4 Scaled - Transiciones Defensa-Ataque
# Adaptada para 4 jugadores (1 portero + 3 campo)
#
# Formaciones:
# DEFENSA: t121_4v4_scaled (1 defensor + 1 medio + 1 delantero) - equilibrada
# ATAQUE:  t13_4v4_scaled (1 defensor + 2 delanteros) - más agresiva
#
# Transiciones:
# - Defensa -> Ataque: ballX > 500 y tiempo > 280ms
# - Ataque -> Defensa: ballX < -500 o pocos jugadores

tactics = [
          {
          # ESTADO DEFENSIVO: Formación equilibrada 1-1-1
          # 1 defensor en zona propia, 1 mediocampista en medio campo, 1 delantero en zona ofensiva
          tactic = t121_4v4_scaled;
          transitions = [
          {
          # Transición a Ataque: Balón en zona ofensiva de forma sostenida
          to = t13_4v4_scaled;
          conditions = [
          {
          numOfFieldPlayersGE = 3;
          ballXThreshold = 500;
          timeSinceBallAheadOfThresholdGE = 280;
          }
          ];
          }
          ];
          },
          {
          # ESTADO OFENSIVO: Formación más atacante 1-0-2
          # 1 defensor atrás, 2 delanteros adelante
          tactic = t13_4v4_scaled;
          transitions = [
          {
          # Transición a Defensa: Pocos jugadores disponibles
          to = t121_4v4_scaled;
          conditions = [
          {
          numOfFieldPlayersLE = 2;
          }
          ];
          },
          {
          # Transición a Defensa: Balón retrocede a zona propia
          to = t121_4v4_scaled;
          conditions = [
          {
          numOfFieldPlayersGE = 3;
          ballXThreshold = -500;
          timeSinceBallBehindThresholdGE = 280;
          }
          ];
          }
          ];
          }
];

# Jugadas propias de saque
ownKickOffs = [
              {
              type = attackKickOff_scaled;
              weight = 1;
              }
];

# Jugadas de saque del oponente
opponentKickOffs = [
                   {
                   type = kiteKickOff_scaled;
                   weight = 1;
                   }
];

# Penaltis propios
ownPenaltyKicks = [
                  {
                  type = theOneTrueOwnPenaltyKick_scaled;
                  weight = 1;
                  }
];

# Penaltis del oponente (defensa)
opponentPenaltyKicks = [
                       {
                       type = theOneTrueOpponentPenaltyKick_scaled;
                       weight = 1;
                       }
];

# Saques de esquina o tiros libres propios
ownFreeKicks = [
               {
               type = ownCornerKick_scaled;
               weight = 1;
               },
               {
               type = ownGoalKick_scaled;
               weight = 1;
               }
];

# Saques de esquina o tiros libres del oponente (defensa)
opponentFreeKicks = [
                    {
                    type = opponentCornerKick_scaled;
                    weight = 1;
                    }
];
